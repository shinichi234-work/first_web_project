{% extends 'pages/base.html' %}

{% block title %}Contact — RaceHub{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <h1 class="mb-4">Contact Us</h1>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.subject.id_for_label }}" class="form-label">{{ form.subject.label }}</label>
                        {{ form.subject }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.email.id_for_label }}" class="form-label">{{ form.email.label }}</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.text.id_for_label }}" class="form-label">{{ form.text.label }}</label>
                        {{ form.text }}
                        {% if form.text.errors %}
                            <div class="text-danger small mt-1">{{ form.text.errors }}</div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-danger">Send Message</button>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
