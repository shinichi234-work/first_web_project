{% extends 'pages/base.html' %}

{% block title %}{{ article.title }} — RaceHub{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h1 class="mb-3">{{ article.title }}</h1>
                <p class="text-muted mb-4">Published: {{ article.created_at }} &nbsp;|&nbsp; Views: {{ article.views_count }}</p>
                <hr>
                <div class="mt-4">
                    {{ article.content|linebreaks }}
                </div>
                <div class="mt-5 d-flex gap-2">
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary">← Back to Articles</a>
                    <a href="{% url 'article_update' article.pk %}" class="btn btn-danger">Edit</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
